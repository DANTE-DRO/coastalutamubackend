<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Utamu Agency • Admin Login</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Roboto,Arial,sans-serif;min-height:100vh;background:radial-gradient(circle at 20% 20%,#3a0f52,#0b0510 70%);display:flex;align-items:center;justify-content:center;color:#fff;padding:20px}
  .card{background:linear-gradient(135deg,#1a0a24,#2d0f3a);border:1px solid #6b1f8f;border-radius:24px;padding:44px;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(120,20,180,.4)}
  .logo{text-align:center;margin-bottom:24px}
  .logo h1{background:linear-gradient(45deg,#ff4d8d,#ffd166);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-size:32px;letter-spacing:2px}
  .logo p{color:#c9a3ff;font-size:12px;letter-spacing:3px;margin-top:4px}
  label{display:block;color:#c9a3ff;font-size:13px;margin-bottom:8px;letter-spacing:1px}
  input{width:100%;padding:14px 16px;border-radius:12px;border:1px solid #4a1e6b;background:#0f0518;color:#fff;font-size:16px;outline:none}
  input:focus{border-color:#ff4d8d;box-shadow:0 0 0 3px rgba(255,77,141,.2)}
  button{width:100%;margin-top:20px;padding:14px;background:linear-gradient(45deg,#ff4d8d,#c9268f);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:bold;letter-spacing:1px;cursor:pointer;transition:transform .2s}
  button:hover{transform:translateY(-2px)}
  .msg{color:#ff6b6b;margin-top:14px;font-size:13px;text-align:center;min-height:16px}
  .foot{text-align:center;margin-top:24px;font-size:11px;color:#7a5a99}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>UTAMU</h1>
    <p>ADMIN PANEL</p>
  </div>
  <form id="f">
    <label>Password</label>
    <input type="password" id="pw" autocomplete="current-password" required>
    <button type="submit">🔐 Enter Admin</button>
    <div class="msg" id="msg"></div>
  </form>
  <div class="foot">Authorized personnel only • All access is logged</div>
</div>
<script>
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  msg.textContent = 'Authenticating…';
  try {
    const r = await fetch('/admin/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',
      body: JSON.stringify({ password: document.getElementById('pw').value })
    });
    const j = await r.json();
    if (j.ok) { window.location = '/admin'; }
    else { msg.textContent = j.error || 'Login failed'; }
  } catch (err) { msg.textContent = 'Network error'; }
});
</script>
</body>
</html>
